<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias</title>
    
    <link rel="icon" type="image/png" href="imagens/icone_noticias.png" >

   
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

      <link rel="stylesheet" href="noticias.css">

</head>
<body>

    <nav class="menu-noticias">


        <div class="logo">
            <img src="imagens/icone_noticias.png">
            <h1>Notícias da Copa</h1>
        </div>
        


        <ul class="nav-links">
            <li><a href="#ultimas_noticias">Mais Recentes</a></li>
            <li><a href="#estadios">Estadios</a></li>
            <li><a href="#selecoes">Seleções</a></li>
            <li><a href="#jogos">Jogos</a></li>
            <li><a href="#pontuacao">Pontuação</a></li>
        
        </ul>

    </nav>



<!-- CAROUSEL -->

<section class="hero-carousel">

    <div id="carouselCopa" class="carousel slide carousel-fade" data-bs-ride="carousel">

        <!-- INDICADORES -->

        <div class="carousel-indicators">

            <button type="button" data-bs-target="#carouselCopa" data-bs-slide-to="0" class="active"></button>

            <button type="button" data-bs-target="#carouselCopa" data-bs-slide-to="1"></button>

            <button type="button" data-bs-target="#carouselCopa" data-bs-slide-to="2"></button>

        </div>

        <!-- IMAGENS -->

        <div class="carousel-inner">

            <!-- SLIDE 1 -->

            <div class="carousel-item active">

                <img src="imagens/copa-noticias-1.png" class="d-block w-100">

                <div class="overlay"></div>

                <div class="carousel-caption">

                    <h1>Notícias da Copa</h1>

                    <p>Últimas notícias da Copa do Mundo em tempo real.</p>

                </div>

            </div>

            <!-- SLIDE 2 -->

            <div class="carousel-item">

                <img src="imagens/copa-noticias-2.png" class="d-block w-100">

                <div class="overlay"></div>

                <div class="carousel-caption">

                    <h1>Os Maiores Craques</h1>

                    <p>Acompanhe estrelas e seleções históricas.</p>

                </div>

            </div>

            <!-- SLIDE 3 -->

            <div class="carousel-item">

                <img src="imagens/copa-noticias-3.png" class="d-block w-100">

                <div class="overlay"></div>

                <div class="carousel-caption">

                    <h1>Emoção em Cada Jogo</h1>

                    <p>Resultados, notícias e bastidores da Copa.</p>

                </div>

            </div>

        </div>

        <!-- BOTÕES -->

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselCopa" data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselCopa" data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</section>










    <footer>

    </footer>

     
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
